name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: deb
            artifact_glob: src-tauri/target/release/bundle/deb/*.deb
          - os: windows-latest
            bundle: nsis
            artifact_glob: src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    env:
      GH_TOKEN: ${{ github.token }}
      PDFME_REPO_URL: ${{ vars.PDFME_REPO_URL || 'https://github.com/roweiku/pdfme.git' }}
      PDFME_REF: ${{ vars.PDFME_REF || '1b4c884db01770c1cbc2c7aed93520447f323b9e' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify tag matches package version
        shell: bash
        run: |
          VERSION=$(python -c "import json; print(json.load(open('package.json'))['version'])")
          TAURI_VERSION=$(python -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          test "$VERSION" = "$TAG"
          test "$TAURI_VERSION" = "$TAG"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            clang \
            libclang-dev \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev

      - name: Install Windows bundling dependencies
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install nsis -y

      - name: Checkout sibling pdfme repository
        shell: bash
        run: |
          git clone "$PDFME_REPO_URL" "$GITHUB_WORKSPACE/../pdfme"
          cd "$GITHUB_WORKSPACE/../pdfme"
          git checkout "$PDFME_REF"

      - name: Install and build pdfme
        shell: bash
        env:
          npm_config_script_shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/../pdfme"
          npm install
          npm run build

      - name: Download OCR model assets
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/models" "$GITHUB_WORKSPACE/src-tauri/models"
          gh release download models-v1 --repo "$GITHUB_REPOSITORY" --pattern "ocr-models-v1.tar.gz" --dir "$RUNNER_TEMP/models"
          python - <<'PY'
          import os
          import tarfile

          archive = os.path.join(os.environ['RUNNER_TEMP'], 'models', 'ocr-models-v1.tar.gz')
          target = os.path.join(os.environ['GITHUB_WORKSPACE'], 'src-tauri', 'models')
          with tarfile.open(archive, 'r:gz') as tar:
              tar.extractall(target)
          PY

      - name: Install project dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build application bundle
        shell: bash
        run: pnpm tauri build --bundles ${{ matrix.bundle }}

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
